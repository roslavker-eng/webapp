<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АБСОЛЮТ</title>
    <script src="https://telegram.org/js/telegram-web-app.js?v=3"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap');
        :root { --accent: #5A9BD5; --bg-deep: #0a1628; --bg-light: #1c3554; }
        body { 
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-deep) 100%);
            color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; 
        }
        .fade-in { animation: fadeIn 2s ease-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; filter: blur(10px); } 100% { opacity: 1; filter: blur(0); } }
        canvas { filter: drop-shadow(0 0 30px var(--accent)); }
        .status-text { font-size: 11px; letter-spacing: 0.2em; color: rgba(255,255,255,0.5); text-transform: uppercase; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div id="main-ui" class="fade-in flex flex-col items-center z-10 text-center">
        <h1 class="text-xl font-light tracking-[0.8em] uppercase opacity-80 mb-1">СИСТЕМА АБСОЛЮТ</h1>
        <div id="accent-line" class="h-[1px] w-32 bg-[var(--accent)] opacity-50 mx-auto"></div>
        
        <canvas id="starCanvas" class="mt-12"></canvas>
        
        <div class="mt-16 flex flex-col items-center gap-6">
            <p id="status" class="status-text">Готов к настройке</p>
            <button id="syncBtn" onclick="performSync()" class="backdrop-blur-md bg-white/5 border border-white/20 px-12 py-4 text-[12px] tracking-[0.2em] uppercase active:scale-95 transition-all">
                Настроить время
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let themeColor = '#5A9BD5';

        function playClickSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {}
        }

        function drawStar(values) {
            const size = 320; canvas.width = size; canvas.height = size;
            const centerX = size/2; const centerY = size/2; const maxR = 100;
            const points = [];
            for (let i = 0; i < 6; i++) {
                const r = (values[i]/100) * maxR;
                const a = (i * 60 - 90) * (Math.PI/180);
                points.push({x: centerX + r * Math.cos(a), y: centerY + r * Math.sin(a)});
                const r2 = ((values[i] + values[(i+1)%6])/200) * (maxR/1.7);
                const a2 = (i * 60 - 60) * (Math.PI/180);
                points.push({x: centerX + r2 * Math.cos(a2), y: centerY + r2 * Math.sin(a2)});
            }
            ctx.clearRect(0,0,size,size); ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.closePath();
            ctx.strokeStyle = themeColor; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = themeColor + '15'; ctx.fill();
        }

        function performSync() {
            playClickSound();
            document.getElementById('syncBtn').style.display = 'none';
            document.getElementById('status').innerText = "Сверяю часовой пояс...";
            setTimeout(() => {
                tg.sendData(Intl.DateTimeFormat().resolvedOptions().timeZone);
                document.getElementById('status').innerText = "Готово";
                setTimeout(() => tg.close(), 800);
            }, 1200);
        }

        drawStar([80, 60, 90, 50, 70, 85]);
    </script>
</body>
</html>
