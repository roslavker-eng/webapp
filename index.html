<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АБСОЛЮТ | ДАШБОРД</title>
    <script src="https://telegram.org/js/telegram-web-app.js?v=3"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap');
        :root { --accent: #5A9BD5; --bg-deep: #0a1628; --bg-light: #1c3554; }
        body { 
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-deep) 100%);
            color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; 
        }
        .fade-in { animation: fadeIn 1.5s ease-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; filter: blur(10px); } 100% { opacity: 1; filter: blur(0); } }
        canvas { filter: drop-shadow(0 0 25px var(--accent)); }
        
        .status-text { font-size: 10px; letter-spacing: 0.3em; color: rgba(255,255,255,0.4); text-transform: uppercase; }
        
        /* Контейнер для точного позиционирования */
        .labels-container { position: absolute; width: 320px; height: 320px; pointer-events: none; }
        
        .sphere-label {
            position: absolute;
            font-size: 8px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
            transform: translate(-50%, -50%); /* Центровка каждой надписи */
            text-align: center;
            line-height: 1.4;
        }
        .sphere-label span { color: var(--accent); font-weight: 300; display: block; font-size: 10px; }
        .sphere-label.active { color: #fff; text-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div id="main-ui" class="fade-in flex flex-col items-center z-10 text-center w-full">
        <h1 class="text-lg font-light tracking-[0.7em] uppercase opacity-70 mb-1">СИСТЕМА АБСОЛЮТ</h1>
        <div class="h-[1px] w-24 bg-[var(--accent)] opacity-40 mx-auto"></div>
        
        <div class="relative mt-12 w-[320px] h-[320px] flex items-center justify-center">
            <canvas id="starCanvas"></canvas>
            
            <div class="labels-container">
                <div id="label-0" class="sphere-label active" style="top: 8%; left: 50%;">Духовно-психологическая<br><span id="val-0">0%</span></div>
                <div id="label-1" class="sphere-label" style="top: 28%; left: 88%;">Социальная<br><span id="val-1">0%</span></div>
                <div id="label-2" class="sphere-label" style="top: 72%; left: 88%;">Физическая<br><span id="val-2">0%</span></div>
                <div id="label-3" class="sphere-label" style="top: 92%; left: 50%;">Сексуальная<br><span id="val-3">0%</span></div>
                <div id="label-4" class="sphere-label" style="top: 72%; left: 12%;">Материальная<br><span id="val-4">0%</span></div>
                <div id="label-5" class="sphere-label" style="top: 28%; left: 12%;">Интеллектуальная<br><span id="val-5">0%</span></div>
            </div>
        </div>
        
        <div class="mt-12 flex flex-col items-center gap-6">
            <p id="status" class="status-text">Анализ состояния</p>
            <button onclick="tg.close()" class="backdrop-blur-md bg-white/5 border border-white/20 px-10 py-3 text-[10px] tracking-[0.2em] uppercase active:scale-95 transition-all">
                Закрыть систему
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        const themeColor = '#5A9BD5';

        function drawStar(values) {
            const size = 320; canvas.width = size; canvas.height = size;
            const centerX = size/2; const centerY = size/2; 
            const maxR = 105; // Чуть уменьшил радиус звезды, чтобы надписи были ближе

            const points = [];
            for (let i = 0; i < 6; i++) {
                // Обновляем проценты в HTML
                document.getElementById(`val-${i}`).innerText = values[i] + '%';
                
                const r = (values[i]/100) * maxR;
                const a = (i * 60 - 90) * (Math.PI/180);
                points.push({x: centerX + r * Math.cos(a), y: centerY + r * Math.sin(a)});
                
                const r2 = ((values[i] + values[(i+1)%6])/200) * (maxR/1.9);
                const a2 = (i * 60 - 60) * (Math.PI/180);
                points.push({x: centerX + r2 * Math.cos(a2), y: centerY + r2 * Math.sin(a2)});
            }
            
            ctx.clearRect(0,0,size,size); 
            
            // Сетка
            ctx.strokeStyle = 'rgba(90, 155, 213, 0.08)';
            ctx.lineWidth = 1;
            for(let j=1; j<=4; j++) {
                ctx.beginPath(); ctx.arc(centerX, centerY, (maxR/4)*j, 0, Math.PI*2); ctx.stroke();
            }

            // Звезда
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.closePath();
            
            ctx.strokeStyle = themeColor; ctx.lineWidth = 2; ctx.stroke();
            const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxR);
            grad.addColorStop(0, themeColor + '50'); grad.addColorStop(1, themeColor + '10');
            ctx.fillStyle = grad; ctx.fill();
        }

        // Данные: [Психо, Соц, Физ, Секс, Мат, Интел]
        drawStar([85, 70, 95, 80, 65, 75]);
    </script>
</body>
</html>
