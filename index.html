<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АБСОЛЮТ | ДАШБОРД</title>
    <script src="https://telegram.org/js/telegram-web-app.js?v=3"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap');
        :root { --accent: #5A9BD5; --bg-deep: #0a1628; --bg-light: #1c3554; }
        body { 
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-deep) 100%);
            color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; 
        }
        .fade-in { animation: fadeIn 2s ease-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; filter: blur(10px); } 100% { opacity: 1; filter: blur(0); } }
        canvas { filter: drop-shadow(0 0 30px var(--accent)); }
        .status-text { font-size: 11px; letter-spacing: 0.2em; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        
        .sphere-label {
            position: absolute;
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            width: 110px;
            text-align: center;
        }
        .sphere-label.active { color: var(--accent); opacity: 1; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div id="main-ui" class="fade-in flex flex-col items-center z-10 text-center w-full px-4">
        <h1 class="text-xl font-light tracking-[0.8em] uppercase opacity-80 mb-1">СИСТЕМА АБСОЛЮТ</h1>
        <div class="h-[1px] w-32 bg-[var(--accent)] opacity-50 mx-auto"></div>
        
        <div class="relative mt-16 w-[320px] h-[320px] flex items-center justify-center">
            <canvas id="starCanvas"></canvas>
            
            <div class="sphere-label active" style="top: -5px; left: 50%; transform: translateX(-50%);">Психо-Духовная</div>
            
            <div class="sphere-label" style="top: 65px; right: -25px; text-align: left;">Интеллект</div>
            <div class="sphere-label" style="bottom: 65px; right: -25px; text-align: left;">Материальная</div>
            
            <div class="sphere-label" style="bottom: -5px; left: 50%; transform: translateX(-50%);">Сексуальная</div>
            
            <div class="sphere-label" style="bottom: 65px; left: -25px; text-align: right;">Физическая</div>
            <div class="sphere-label" style="top: 65px; left: -25px; text-align: right;">Социальная</div>
        </div>
        
        <div class="mt-16 flex flex-col items-center gap-6">
            <p id="status" class="status-text tracking-[0.3em]">Система активна</p>
            <button id="syncBtn" onclick="tg.close()" class="backdrop-blur-md bg-white/5 border border-white/20 px-12 py-4 text-[11px] tracking-[0.25em] uppercase active:scale-95 transition-all">
                Закрыть
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let themeColor = '#5A9BD5';

        function drawStar(values) {
            const size = 320; canvas.width = size; canvas.height = size;
            const centerX = size/2; const centerY = size/2; const maxR = 115;
            const points = [];
            
            for (let i = 0; i < 6; i++) {
                const r = (values[i]/100) * maxR;
                const a = (i * 60 - 90) * (Math.PI/180);
                points.push({x: centerX + r * Math.cos(a), y: centerY + r * Math.sin(a)});
                
                const r2 = ((values[i] + values[(i+1)%6])/200) * (maxR/1.8);
                const a2 = (i * 60 - 60) * (Math.PI/180);
                points.push({x: centerX + r2 * Math.cos(a2), y: centerY + r2 * Math.sin(a2)});
            }
            
            ctx.clearRect(0,0,size,size); 
            ctx.beginPath(); 
            ctx.moveTo(points[0].x, points[0].y);
            points.forEach(p => ctx.lineTo(p.x, p.y)); 
            ctx.closePath();
            
            ctx.strokeStyle = themeColor; 
            ctx.lineWidth = 2; 
            ctx.stroke();
            
            const gradient = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, maxR);
            gradient.addColorStop(0, themeColor + '40');
            gradient.addColorStop(1, themeColor + '10');
            ctx.fillStyle = gradient; 
            ctx.fill();
        }

        // Заглушка данных для визуализации (потом пойдут из БД)
        drawStar([85, 70, 95, 80, 60, 75]);
    </script>
</body>
</html>
