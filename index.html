<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АБСОЛЮТ | ИНТЕРФЕЙС</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap');
        :root { --accent: #4682B4; }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; touch-action: manipulation; }
        .film-grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_grain.png'); opacity: 0.04; pointer-events: none; z-index: 50; }
        .fade-in { animation: fadeIn 2.5s ease-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; filter: blur(8px); } 100% { opacity: 1; filter: blur(0); } }
        canvas { filter: drop-shadow(0 0 20px var(--accent)); transition: filter 1s ease; }
        .status-text { font-size: 10px; letter-spacing: 0.3em; color: #444; text-transform: uppercase; font-style: italic; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div class="film-grain"></div>
    <div id="main-ui" class="fade-in flex flex-col items-center z-10">
        <h1 class="text-2xl font-thin tracking-[0.6em] uppercase opacity-30 mb-1">Абсолют</h1>
        <div id="accent-line" class="h-[1px] w-16 bg-[var(--accent)] shadow-[0_0_10px_var(--accent)] transition-all duration-[3000ms]"></div>
        <canvas id="starCanvas" class="mt-12"></canvas>
        <div class="mt-16 flex flex-col items-center gap-6">
            <p id="status" class="status-text">Система готова</p>
            <button id="syncBtn" onclick="performSync()" class="border border-white/10 px-8 py-3 text-[11px] tracking-[0.2em] uppercase hover:bg-white/5 active:scale-95 transition-all opacity-60">
                Подтвердить вход
            </button>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let themeColor = '#4682B4';
        function initTheme() {
            const now = new Date();
            if (now.getDay() === 6) themeColor = '#8B4513';
            document.documentElement.style.setProperty('--accent', themeColor);
            document.getElementById('accent-line').style.backgroundColor = themeColor;
        }
        function drawStar(values) {
            const size = 280;
            canvas.width = size; canvas.height = size;
            const centerX = size / 2; const centerY = size / 2;
            const maxR = 100;
            const points = [];
            for (let i = 0; i < 6; i++) {
                const val = values[i] || 10;
                const rPeak = (val / 100) * maxR;
                const anglePeak = (i * 60 - 90) * (Math.PI / 180);
                points.push({ x: centerX + rPeak * Math.cos(anglePeak), y: centerY + rPeak * Math.sin(anglePeak) });
                const nextVal = values[(i + 1) % 6] || 10;
                const rDent = ((val + nextVal) / 200) * (maxR / Math.sqrt(3));
                const angleDent = (i * 60 - 60) * (Math.PI / 180);
                points.push({ x: centerX + rDent * Math.cos(angleDent), y: centerY + rDent * Math.sin(angleDent) });
            }
            ctx.clearRect(0, 0, size, size);
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.closePath();
            ctx.strokeStyle = themeColor;
            ctx.lineWidth = 1.2;
            ctx.stroke();
            ctx.fillStyle = themeColor + '15';
            ctx.fill();
        }
        function performSync() {
            const btn = document.getElementById('syncBtn');
            const status = document.getElementById('status');
            btn.style.display = 'none';
            status.innerText = "Синхронизация...";
            status.classList.add('animate-pulse');
            setTimeout(() => {
                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                tg.sendData(timezone);
                status.innerText = "Готово";
                setTimeout(() => tg.close(), 1000);
            }, 2000);
        }
        initTheme();
        drawStar([50, 40, 60, 30, 55, 45]);
    </script>
</body>
</html>
