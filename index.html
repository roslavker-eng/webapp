<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Синхронизация времени</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background-color: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">
    <h2>Синхронизация...</h2>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        tg.sendData(JSON.stringify({ timezone: userTimeZone }));
    </script>
</body>
</html>
