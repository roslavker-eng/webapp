<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АБСОЛЮТ | СИСТЕМА</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap');
        
        :root { 
            --accent: #4682B4; 
            --bg-color: #050a14; /* Тот самый тёмно-синий */
        }
        
        body { 
            background-color: var(--bg-color); 
            background: radial-gradient(circle at center, #0a1628 0%, #050a14 100%);
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            touch-action: manipulation; 
        }

        .film-grain { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_grain.png'); 
            opacity: 0.03; 
            pointer-events: none; 
            z-index: 50; 
        }

        .fade-in { animation: fadeIn 2.5s ease-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; filter: blur(8px); } 100% { opacity: 1; filter: blur(0); } }

        canvas { 
            filter: drop-shadow(0 0 25px var(--accent)); 
            transition: filter 1s ease; 
        }

        .status-text { 
            font-size: 10px; 
            letter-spacing: 0.3em; 
            color: rgba(255,255,255,0.2); 
            text-transform: uppercase; 
            font-style: italic; 
        }

        button {
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.02);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div class="film-grain"></div>

    <div id="main-ui" class="fade-in flex flex-col items-center z-10">
        <h1 class="text-2xl font-thin tracking-[0.6em] uppercase opacity-30 mb-1">Абсолют</h1>
        <div id="accent-line" class="h-[1px] w-16 shadow-[0_0_15px_var(--accent)] transition-all duration-[3000ms]"></div>
        
        <canvas id="starCanvas" class="mt-12"></canvas>
        
        <div class="mt-16 flex flex-col items-center gap-6">
            <p id="status" class="status-text">Система готова</p>
            
            <button id="syncBtn" onclick="performSync()" class="border border-white/10 px-8 py-3 text-[11px] tracking-[0.2em] uppercase hover:bg-white/5 active:scale-95 transition-all opacity-60">
                Подтвердить вход
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let themeColor = '#4682B4';

        // ЗВУК ЩЕЛЧКА (Browser Audio API)
        function playClickSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine'; // Мягкий, но четкий клик
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);

                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {
                console.log('Звук не поддерживается');
            }
        }

        function initTheme() {
            const now = new Date();
            // Сегодня Суббота — включаем коньячный/янтарный
            if (now.getDay() === 6) themeColor = '#C08552'; 
            
            document.documentElement.style.setProperty('--accent', themeColor);
            document.getElementById('accent-line').style.backgroundColor = themeColor;
        }

        function drawStar(values) {
            const size = 300;
            canvas.width = size; canvas.height = size;
            const centerX = size / 2; const centerY = size / 2;
            const maxR = 110;
            const points = [];
            
            for (let i = 0; i < 6; i++) {
                const val = values[i] || 15;
                const rPeak = (val / 100) * maxR;
                const anglePeak = (i * 60 - 90) * (Math.PI / 180);
                points.push({ x: centerX + rPeak * Math.cos(anglePeak), y: centerY + rPeak * Math.sin(anglePeak) });

                const nextVal = values[(i + 1) % 6] || 15;
                const rDent = ((val + nextVal) / 200) * (maxR / Math.sqrt(3));
                const angleDent = (i * 60 - 60) * (Math.PI / 180);
                points.push({ x: centerX + rDent * Math.cos(angleDent), y: centerY + rDent * Math.sin(angleDent) });
            }

            ctx.clearRect(0, 0, size, size);
            
            // Свечение фона за звездой
            const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxR * 1.5);
            grad.addColorStop(0, themeColor + '10');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);

            // Отрисовка линий
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.closePath();
            
            ctx.strokeStyle = themeColor;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            ctx.fillStyle = themeColor + '1A'; // 10% прозрачности
            ctx.fill();
        }

        function performSync() {
            playClickSound(); // Вызываем звук
            
            const btn = document.getElementById('syncBtn');
            const status = document.getElementById('status');
            
            btn.style.display = 'none';
            status.innerText = "Чтение биометрии...";
            status.classList.add('animate-pulse');

            setTimeout(() => {
                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                tg.sendData(timezone);
                
                status.innerText = "Синхронизация завершена";
                setTimeout(() => tg.close(), 1000);
            }, 1800);
        }

        initTheme();
        // Твоя "кривая" звезда для демонстрации
        drawStar([65, 30, 80, 25, 45, 50]);
    </script>
</body>
</html>
