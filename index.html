<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АБСОЛЮТ | СИСТЕМА</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap');
        
        :root { 
            --accent: #4682B4; 
            --bg-deep: #050a14; 
            --bg-light: #0d1b2e;
        }
        
        body { 
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-deep) 100%);
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            touch-action: manipulation; 
        }

        .film-grain { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_grain.png'); 
            opacity: 0.04; 
            pointer-events: none; 
            z-index: 50; 
        }

        .fade-in { animation: fadeIn 2.5s ease-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; filter: blur(10px); } 100% { opacity: 1; filter: blur(0); } }

        canvas { 
            filter: drop-shadow(0 0 30px var(--accent)); 
        }

        .status-text { 
            font-size: 10px; 
            letter-spacing: 0.3em; 
            color: rgba(255,255,255,0.3); 
            text-transform: uppercase; 
            font-style: italic; 
        }

        button {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div class="film-grain"></div>

    <div id="main-ui" class="fade-in flex flex-col items-center z-10 text-center">
        <h1 class="text-xl font-light tracking-[0.8em] uppercase opacity-60 mb-1">СИСТЕМА АБСОЛЮТ</h1>
        <div id="accent-line" class="h-[1px] w-32 shadow-[0_0_20px_var(--accent)] transition-all duration-[3000ms] mx-auto"></div>
        
        <canvas id="starCanvas" class="mt-12"></canvas>
        
        <div class="mt-16 flex flex-col items-center gap-8">
            <p id="status" class="status-text">Инициализация протоколов...</p>
            <button id="syncBtn" onclick="performSync()" class="px-10 py-4 text-[12px] tracking-[0.3em] uppercase hover:bg-white/5 active:scale-95 transition-all opacity-80">
                Подтвердить вход
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let themeColor = '#4682B4';

        function playClickSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(250, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.12);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.12);
            } catch (e) { }
        }

        function initTheme() {
            const now = new Date();
            if (now.getDay() === 6) themeColor = '#D4A373'; // Субботний янтарь
            document.documentElement.style.setProperty('--accent', themeColor);
            document.getElementById('accent-line').style.backgroundColor = themeColor;
        }

        function drawStar(values) {
            const size = 320;
            canvas.width = size; canvas.height = size;
            const centerX = size / 2; const centerY = size / 2;
            const maxR = 110;
            const points = [];
            for (let i = 0; i < 6; i++) {
                const val = values[i] || 25;
                const rPeak = (val / 100) * maxR;
                const anglePeak = (i * 60 - 90) * (Math.PI / 180);
                points.push({ x: centerX + rPeak * Math.cos(anglePeak), y: centerY + rPeak * Math.sin(anglePeak) });
                const nextVal = values[(i + 1) % 6] || 25;
                const rDent = ((val + nextVal) / 200) * (maxR / Math.sqrt(3));
                const angleDent = (i * 60 - 60) * (Math.PI / 180);
                points.push({ x: centerX + rDent * Math.cos(angleDent), y: centerY + rDent * Math.sin(angleDent) });
            }
            ctx.clearRect(0, 0, size, size);
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.closePath();
            ctx.strokeStyle = themeColor;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = themeColor + '1F';
            ctx.fill();
        }

        function performSync() {
            playClickSound();
            const btn = document.getElementById('syncBtn');
            const status = document.getElementById('status');
            btn.style.display = 'none';
            status.innerText = "Синхронизация протоколов...";
            status.classList.add('animate-pulse');
            setTimeout(() => {
                tg.sendData(Intl.DateTimeFormat().resolvedOptions().timeZone);
                status.innerText = "Доступ подтвержден";
                setTimeout(() => tg.close(), 1200);
            }, 2000);
        }

        initTheme();
        drawStar([70, 45, 80, 30, 60, 55]);
    </script>
</body>
</html>
